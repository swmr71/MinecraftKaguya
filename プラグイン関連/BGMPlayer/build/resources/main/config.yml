# BGM Plugin 設定ファイル

# JavaリソースパックのURL（公開HTTPSサーバーに置いたzipのURL）
resource-pack-url: "https://github.com/swmr71/MinecraftKaguya/releases/download/BGM-latest/resourcepack.zip"

# リソースパックのSHA-1ハッシュ（任意だが推奨）
# sha1sum bgm-java.zip で取得できる
resource-pack-sha1: "a8ac3e8892a98597db1e4ba808216e0bce4e1d72"

# リソースパックの適用を強制するか
force-resource-pack: true

# 音量 (0.0 ~ 1.0)
volume: 1.0

# ピッチ (通常は1.0)
pitch: 1.0

# BGM一覧（ランダムに選ばれる）
# key: sounds.jsonのキーと一致させる
# duration-seconds: 曲の長さ（秒）
sounds:
  - key: "custom.bgm1"
    duration-seconds: 252
  - key: "custom.bgm2"
    duration-seconds: 180
