name: BGM Plugin Release Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'プラグイン関連/BGMPlayer/**'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      # 1. リソースパックを ZIP アーカイブ
      # フォルダがどこにあってもいいように find で探して cd します
      - name: Archive resourcepack
        run: |
          RP_DIR=$(find . -name "java-resourcepack" -type d | head -n 1)
          echo "Found resourcepack at: $RP_DIR"
          cd "$RP_DIR"
          zip -r ../../../resourcepack.zip .
          cd -

      # 2. GitHub Releases 投稿
      - name: Create New BGM-latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: BGM-latest
          name: "BGM Latest Release (Build ${{ github.run_number }})"
          files: resourcepack.zip
          body: "Auto-generated"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. SHA1 ハッシュ取得
      - name: Calculate SHA1
        id: sha
        run: |
          LOWER_SHA=$(sha1sum resourcepack.zip | awk '{print $1}' | tr '[:upper:]' '[:lower:]')
          echo "hash=$LOWER_SHA" >> $GITHUB_OUTPUT
          echo "Calculated Hash: $LOWER_SHA"

      # 4. config.yml の書き換え
      # ファイルを検索して、見つかった場所に対して置換を実行します
      - name: Update config.yml
        run: |
          HASH="${{ steps.sha.outputs.hash }}"
          # リポジトリ内のすべての config.yml を探して置換（より安全な正規表現を使用）
          find . -name "config.yml" -exec sed -i "s/resource-pack-sha1: .*/resource-pack-sha1: \"$HASH\"/" {} +
          
          # デバッグ用に書き換え後の内容をログに出力
          echo "--- Updated config.yml content ---"
          find . -name "config.yml" -exec grep "resource-pack-sha1" {} +

      # 5. 変更をコミットしてプッシュ
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 変更されたすべてのファイルを対象にする
          git add -u
          git commit -m "chore: update resource-pack-sha1 to ${{ steps.sha.outputs.hash }} [skip ci]" || echo "No changes to commit"
          git push origin main
